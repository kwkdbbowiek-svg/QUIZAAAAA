# Railway.app konfiguratsiya fayli

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "python run.py"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Environment variables (Railway Dashboard'da o'rnating)
# DATABASE_URL - Railway PostgreSQL avtomatik ta'minlaydi
# REDIS_URL - Railway Redis avtomatik ta'minlaydi
# BOT_TOKEN
# SECRET_KEY
# WEBAPP_URL
