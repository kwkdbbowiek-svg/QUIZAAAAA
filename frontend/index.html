<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>EduQuiz Platform</title>
  
  <!-- Telegram Web App SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  
  <!-- 🔒 Anti-Copy Security CSS -->
  <style>
    * {
      -webkit-user-select: none !important;
      -moz-user-select: none !important;
      -ms-user-select: none !important;
      user-select: none !important;
      -webkit-touch-callout: none !important;
    }
    
    /* Ekran suratiga qarshi */
    body {
      -webkit-user-select: none;
      user-select: none;
    }
    
    /* Loading screen */
    #loading {
      position: fixed;
      inset: 0;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #ffffff30;
      border-top-color: #5b86e5;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading">
    <div class="spinner"></div>
    <p style="color: white; margin-top: 16px; font-family: sans-serif;">EduQuiz yuklanmoqda...</p>
  </div>

  <!-- React App -->
  <div id="root"></div>

  <!-- 🔒 Anti-Copy JavaScript Security -->
  <script>
    // Kontekst menyusini taqiqlash
    document.addEventListener('contextmenu', function(e) {
      e.preventDefault();
      return false;
    });

    // Klaviatura shortcut'larini taqiqlash
    document.addEventListener('keydown', function(e) {
      // Ctrl+C, Ctrl+X, Ctrl+U, Ctrl+S, Ctrl+P, F12, PrintScreen
      if (
        (e.ctrlKey && ['c', 'x', 'u', 's', 'p', 'a'].includes(e.key.toLowerCase())) ||
        e.key === 'F12' ||
        e.key === 'PrintScreen'
      ) {
        e.preventDefault();
        return false;
      }
    });

    // Sichqoncha o'ng tugmasini taqiqlash
    document.addEventListener('mousedown', function(e) {
      if (e.button === 2) {
        e.preventDefault();
        return false;
      }
    });

    // DevTools ochilishini aniqlash
    let devtools = { open: false };
    const threshold = 160;
    setInterval(function() {
      if (
        window.outerWidth - window.innerWidth > threshold ||
        window.outerHeight - window.innerHeight > threshold
      ) {
        if (!devtools.open) {
          devtools.open = true;
          document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#1a1a2e;color:white;font-size:24px;">⛔ Taqiqlangan!</div>';
        }
      } else {
        devtools.open = false;
      }
    }, 500);

    // Drag & Drop taqiqlash
    document.addEventListener('dragstart', function(e) {
      e.preventDefault();
    });

    // Touch callout taqiqlash (iOS)
    document.addEventListener('touchstart', function(e) {
      if (e.touches.length > 1) {
        e.preventDefault();
      }
    }, { passive: false });
  </script>
  
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
